publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  flutter_blue_plus: 1.32.4
  flutter_local_notifications: ^17.2.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1

  flutter_localizations:
